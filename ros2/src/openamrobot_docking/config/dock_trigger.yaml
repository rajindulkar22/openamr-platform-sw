/**:
  ros__parameters:
    # ─── Trigger topic ─────────────────────────────────────────────────────────
    # Publish std_msgs/Bool true on this topic to start the docking sequence.
    # Publish false to trigger undock when `undock_on_false: true`.
    trigger_topic: dock_trigger
    undock_on_false: false

    # ─── Undock + goal gate ───────────────────────────────────────────────────
    # Publish std_msgs/Bool true on undock_trigger_topic to undock: reverse
    # undock_reverse_distance metres straight back, then spin 180° in place.
    #
    # goal_pose_topic / goal_pose_forward_topic implement undock-before-navigate.
    # The Nav2 bt_navigator is remapped (in navigation_launch.py) to listen on
    # goal_pose_forward_topic instead of goal_pose, so this node owns goal_pose:
    # a navigation goal received while docked triggers an undock first, then the
    # goal is republished on goal_pose_forward_topic for Nav2. When not docked
    # the goal passes straight through.
    undock_trigger_topic: undock_robot
    goal_pose_topic: goal_pose
    goal_pose_forward_topic: goal_pose_nav
    undock_reverse_distance: 1.5        # m — straight-line reverse before turning
    undock_reverse_speed: 0.10          # m/s — reverse speed magnitude

    # Legacy fields read by opennav_docking::SimpleChargingDock — kept so the
    # real-robot launch can fall back to the upstream pipeline. The 7-phase
    # sequencer ignores them and runs its own NavigateToPose + control loop.
    use_dock_id: true
    dock_id: home_dock
    dock_type: openamrobot_dock
    navigate_to_staging_pose: false

    # ─── Dock pose in the map frame ───────────────────────────────────────────
    # The third value is the *approach yaw* — the heading the robot has when
    # docked (facing the tag).
    #
    # Sim layout (Raj's walled_world.sdf): robot spawns at world (0, 0) and
    # AMCL initialises at map (0, 0) → map ≡ world. The AprilTag dock sits
    # on the inner face of the +x wall at world (4.899, 0) with the tag
    # normal pointing −x (SDF yaw = π). The robot approaches from the
    # inside of the room facing +x, so the approach yaw is 0.
    dock_pose_x: 4.899
    dock_pose_y: 0.0
    dock_pose_yaw: 0.0

    # ─── Phase 1 — Nav2 NavigateToPose to the staging zone ───────────────────
    # Distance (m) in front of the dock at which the robot first stops, and
    # the distance at which the perpendicular-line tracking begins. With
    # the 0.40 m AprilTag and the 1.047 rad camera FOV (Raj's setup), 1.5 m
    # gives ~120 px of tag in the image — comfortable for sub-pixel solvePnP.
    staging_distance: 1.5
    # Hold (s) at staging before the tag search begins, so velocity decays
    # smoothly and the camera image stabilises.
    staging_hold_seconds: 1.0

    # ─── Phase 2 — tag search & centring scan ────────────────────────────────
    # After Nav2 reaches the staging zone the robot rotates in place to
    # centre the tag in the camera image. The scan operates in two regimes:
    #
    #   - open-loop rotation at scan_rotation_speed when no detection;
    #   - closed-loop yaw P-control (omega = −scan_centring_kp × atan2(X,Z)
    #     in camera_optical frame) once the tag is in view.
    #
    # It exits when the tag is within scan_centring_tolerance of the image
    # centre for scan_consecutive_target frames in a row.
    #
    # Using the camera-frame angle rather than the running-average map
    # position means the centring is robust to solvePnP map-frame bias:
    # the tag is centred as it ACTUALLY appears in the image.
    scan_rotation_speed: 0.3            # rad/s — open-loop scan + clamp on centring
    scan_consecutive_target: 5          # centred frames in a row
    scan_centring_tolerance: 0.035      # rad ≈ 2° — tag must be this close to image centre
    scan_centring_kp: 1.0               # rad/s per rad of image-frame angle

    # ─── Phase 2 — initial filter (running average seed) ─────────────────────
    # Number of samples folded into the running-average tag pose before
    # phase 3 (the spin to perpendicular). The running average then keeps
    # updating throughout phase 4.
    filter_num_samples: 40
    # Maximum time (s) to wait for filter_num_samples. The tag publisher
    # runs at ~10 Hz, so 40 samples need ≥4 s plus margin.
    filter_max_collect_time: 6.0

    # ─── Phase 3 — spin in place to perpendicular yaw ────────────────────────
    spin_kp: 1.5
    spin_max_omega: 0.3
    # Phase 3 exits when |yaw_err| < spin_yaw_tolerance. 0.02 rad ≈ 1.1°.
    spin_yaw_tolerance: 0.02

    # ─── Phase 4 — line-tracking advance (pure-pursuit) ──────────────────────
    # Drive forward toward the running-average tag while steering to stay on
    # the perpendicular line through the averaged tag centre.
    #
    # Pure-pursuit control law:
    #
    #     desired_yaw = perp_yaw − atan2(lateral, line_lookahead_distance)
    #     omega       = line_yaw_kp × (desired_yaw − robot_yaw)
    #     omega       saturated by drive_yaw_max_omega
    #
    # The atan2 maps the signed lateral offset to a bounded heading deviation
    # (±π/2). As the robot approaches the line, lateral → 0, so desired_yaw
    # → perp_yaw and the robot arrives perpendicular to the tag — no
    # standing yaw bias at the dock.
    #
    # Tuning intuition:
    #   - smaller line_lookahead_distance = more aggressive lateral
    #     convergence (steeper desired heading at the same offset);
    #   - increase line_yaw_kp to track desired_yaw faster (note the
    #     drive_yaw_max_omega saturation);
    #   - if the robot oscillates near the line, increase lookahead
    #     distance or decrease line_yaw_kp.
    docking_distance: 0.9               # m — final distance from the averaged tag.
                                         # Stops the robot before the near-field
                                         # regime where small lateral motion
                                         # produces large image-angle changes
                                         # that any final-approach corrector
                                         # would over-react to.
    drive_speed: 0.05                   # m/s — forward speed (tapered near tag)
    line_yaw_kp: 2.5                    # rad/s per rad of (desired_yaw − robot_yaw)
    line_lookahead_distance: 0.3        # m — pure-pursuit lookahead on the perpendicular line.
                                         # Smaller = steeper desired heading at
                                         # a given offset = faster lateral
                                         # convergence onto the line.
    drive_yaw_max_omega: 0.3            # rad/s clamp on omega
    drive_rate_hz: 20.0                 # Hz control loop frequency

    # Distance (m) below which Phase 4 switches from map-frame line
    # tracking to camera-frame visual servoing.
    #
    # Above this distance:
    #   The robot tracks the perpendicular line through the running-
    #   average tag (pure-pursuit). The average keeps refining the line.
    #
    # Below this distance:
    #   The running average is frozen. The heading controller switches
    #   to a closed-loop on the IMAGE-FRAME angle to the tag:
    #
    #       omega = -visual_servo_kp · atan2(X_optical, Z_optical)
    #
    #   This keeps the tag centred in the image even when map-frame
    #   solvePnP becomes biased in the near field (corners hugging the
    #   edge of the FOV). "Keep the tag centred in the camera" is
    #   directly equivalent to "drive straight toward the tag", so this
    #   produces a clean head-on final approach.
    #
    # Set to 0 to disable visual servoing (line tracking all the way).
    visual_servo_distance: 1.0
    visual_servo_kp: 0.6                # rad/s per rad of image-frame angle
    # Number of fresh Phase-4 detections accepted before the line is
    # declared "stabilised" and the visual servo takes over. The first
    # batch of Phase-4 samples are taken while the robot is still far
    # from the dock (cleanest detections); once we have enough of them
    # the line is locked and we don't refine it any further with the
    # noisier near-field samples. Set to 0 to disable the count-based
    # trigger (only visual_servo_distance will then drive the handover).
    line_stabilization_samples: 25
    # Low-pass smoothing on the image-frame angle. alpha = 0.2 means
    # each new measurement contributes 20% to the filtered value
    # (time constant ≈ 5 detection frames ≈ 0.35 s at 14 Hz). Lower
    # values reject more noise but respond slower; alpha = 1.0
    # disables filtering entirely.
    visual_servo_filter_alpha: 0.2

    # ─── Phase 4 — robust running-average update ─────────────────────────────
    # Two safeguards keep noisy/outlier detections from corrupting the
    # running-average line during Phase 4:
    #
    # 1) OUTLIER REJECTION. A new detection that lands more than this
    #    many metres from the current running-average position (in XY)
    #    is dropped (logged as a warning). Typical legitimate solvePnP
    #    jitter is ~5 cm, so 0.30 m is a generous cutoff that catches
    #    the gross single-frame glitches without dropping good samples.
    #    Set to 0 to disable.
    refinement_outlier_threshold: 0.30
    #
    # 2) DISTANCE-WEIGHTED MEAN. The running mean is a weighted average
    #    of ALL accepted detections. Far-field samples (cleaner, tag
    #    well inside the FOV) contribute more weight than near-field
    #    samples (noisier corners at the FOV edges). Weight is linear
    #    in distance-to-tag, clamped to [refinement_weight_min, 1.0]:
    #
    #       weight = clamp(distance / full_distance, min, 1.0)
    #
    #    With min=0.1 and full_distance=1.5:
    #       sample @ 1.5 m → weight 1.0   (full)
    #       sample @ 0.75 m → weight 0.5
    #       sample @ 0.15 m → weight 0.1  (floor)
    refinement_weight_min: 0.1
    refinement_weight_full_distance: 1.5
    # Raj's Nav2 stack does NOT run a velocity_smoother that subscribes to
    # /cmd_vel_nav, so publishing there is a dead end (0 subscribers). We
    # publish straight to /cmd_vel which the gz bridge forwards to the
    # DiffDrive plugin. Nav2's own controller is idle by Phase 4 (its
    # NavigateToPose goal completed in Phase 1), so we don't fight it.
    cmd_vel_topic: /cmd_vel

    # ─── Tag detection topic ─────────────────────────────────────────────────
    detection_topic: /detected_dock_pose
    # Maximum age (s) of a detection message before it is dropped as stale.
    detection_max_age: 1.5
